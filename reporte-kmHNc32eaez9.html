<style>
  :root{
    --bg:#141210; --panel:#1c1917; --panel2:#221e1b; --border:#332c26;

  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:24px 16px 64px; background:var(--bg); color:var(--text);
    font-family:Georgia,'Times New Roman',serif;
  }
  .wrap{max-width:1000px; margin:0 auto;}
  header{margin-bottom:28px; text-align:center;}
  header h1{
    margin:0 0 4px; font-size:1.9rem; letter-spacing:.06em;
    color:var(--gold); font-weight:normal; text-transform:uppercase;
  }
  header p{margin:0; color:var(--text-dim); font-size:.85rem;}
  .kpis{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; margin-bottom:28px;}
  .kpi{
    background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:18px 20px;
  }
  .kpi .label{font-size:.75rem; text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim);}
  .kpi .value{font-size:1.9rem; color:var(--gold); margin-top:6px;}
  .kpi .sub{font-size:.8rem; color:var(--text-dim); margin-top:4px;}
  .filters{
    display:flex; flex-wrap:wrap; align-items:center; gap:12px;
    background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:14px 18px; margin-bottom:18px;
  }
  .filters label{font-size:.8rem; color:var(--text-dim);}
  .filters input[type=date]{
    background:var(--panel2); border:1px solid var(--border); color:var(--text);
    border-radius:6px; padding:6px 8px; font-family:inherit; font-size:.9rem;
  }
  .filters button{
    background:none; border:1px solid var(--gold-soft); color:var(--gold);
    border-radius:6px; padding:6px 12px; font-family:inherit; font-size:.8rem; cursor:pointer;
  }
  .filters button:hover{background:var(--gold-soft); color:var(--bg);}
  .filters button:disabled{opacity:.5; cursor:default;}
  .filters .spacer{flex:1;}
  #btnActualizar{border-color:var(--gold); color:var(--gold); font-weight:bold;}
  .meta-line{font-size:.8rem; color:var(--text-dim); margin:0 0 6px;}
  .estado-linea{font-size:.78rem; color:var(--text-dim); margin:0 0 10px; min-height:1.1em;}
  .estado-linea.error{color:#d98a8a;}
  .estado-linea.ok{color:#8fbf8f;}
  .table-scroll{overflow-x:auto; border:1px solid var(--border); border-radius:10px;}
  table{width:100%; border-collapse:collapse; font-size:.88rem;}
  thead th{
    text-align:left; padding:10px 12px; background:var(--panel2); color:var(--gold);
    font-weight:normal; text-transform:uppercase; letter-spacing:.05em; font-size:.72rem;
    border-bottom:1px solid var(--border); white-space:nowrap;
  }
  tbody td{padding:9px 12px; border-bottom:1px solid var(--border); vertical-align:top;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:var(--panel2);}
  .obs{color:var(--text-dim); max-width:260px;}
  .empty{padding:28px; text-align:center; color:var(--text-dim);}
  .badge{
    display:inline-block; padding:1px 8px; border-radius:999px; font-size:.72rem;
    border:1px solid var(--gold-soft); color:var(--gold);
  }
  footer{text-align:center; margin-top:24px; font-size:.72rem; color:var(--text-dim);}
</style>
</head>

let activas = [];

function ymd(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function addDays(d, n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function esCancelada(estado){ return (estado||'').toLowerCase().includes('cancel'); }
function fechaLegible(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function normFecha(f){
  f = (f||'').trim();
  if(!f) return null;
  if(/^\d{4}-\d{2}-\d{2}$/.test(f)) return f;
  const m = f.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m){ const [,d,mo,y] = m; return `${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`; }
  return f;
}

const hoy = new Date(); hoy.setHours(0,0,0,0);
const hoyStr = ymd(hoy);
const mananaStr = ymd(addDays(hoy,1));

function sumPersonas(fecha){
  return activas.filter(r=>r.fecha===fecha).reduce((a,r)=>a+(r.personas||0),0);
}
function contarReservas(fecha){
  return activas.filter(r=>r.fecha===fecha).length;
}
function porUbicacion(fecha){
  const rows = activas.filter(r=>r.fecha===fecha);
  const dentro = rows.filter(r=>r.ubicacion==='Adentro').reduce((a,r)=>a+(r.personas||0),0);
  const fuera = rows.filter(r=>r.ubicacion==='Afuera').reduce((a,r)=>a+(r.personas||0),0);
  return {dentro, fuera};
}

function actualizarKpis(){
  document.getElementById('kpiCantHoy').textContent = contarReservas(hoyStr);
  document.getElementById('kpiCantHoySub').textContent = fechaLegible(hoyStr);
  document.getElementById('kpiHoy').textContent = sumPersonas(hoyStr);
  document.getElementById('kpiHoySub').textContent = fechaLegible(hoyStr);
  document.getElementById('kpiManana').textContent = sumPersonas(mananaStr);
  document.getElementById('kpiMananaSub').textContent = fechaLegible(mananaStr);
  const ub = porUbicacion(hoyStr);
  document.getElementById('kpiUbicacion').textContent = `${ub.dentro} · ${ub.fuera}`;
}

const desdeInput = document.getElementById('desde');
const hastaInput = document.getElementById('hasta');
const tbody = document.getElementById('tbody');
const metaLine = document.getElementById('metaLine');
const estadoActualizacion = document.getElementById('estadoActualizacion');

function render(){
  const desde = desdeInput.value;
  const hasta = hastaInput.value;
  let rows = activas.filter(r => {
    if(desde && r.fecha < desde) return false;
    if(hasta && r.fecha > hasta) return false;
    return true;
  });
  rows.sort((a,b) => (a.fecha+a.hora).localeCompare(b.fecha+b.hora));

  if(rows.length === 0){
    tbody.innerHTML = `<tr><td colspan="6" class="empty">No hay reservas en ese rango de fechas.</td></tr>`;
  } else {
    tbody.innerHTML = rows.map(r => `
      <tr>
        <td>${fechaLegible(r.fecha)}</td>
        <td>${r.hora||''}</td>
        <td>${escapeHtml(r.nombre)}</td>
        <td>${r.personas||0}</td>
        <td>${r.ubicacion?`<span class="badge">${r.ubicacion}</span>`:''}</td>
        <td class="obs">${escapeHtml(r.obs)}</td>
      </tr>
    `).join('');
  }
  const totalPersonas = rows.reduce((a,r)=>a+(r.personas||0),0);
  metaLine.textContent = `${rows.length} reserva(s) · ${totalPersonas} persona(s) en el rango seleccionado`;
}

function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function parseCsv(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c === '"'){
        if(text[i+1] === '"'){ field += '"'; i++; }
        else inQuotes = false;
      } else field += c;
    } else {
      if(c === '"') inQuotes = true;
      else if(c === ','){ row.push(field); field=''; }
      else if(c === '\r'){ /* ignorar */ }
      else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else field += c;
    }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r => r.some(v => v !== ''));
}

function csvARenglones(text){
  const rows = parseCsv(text);
  if(rows.length === 0) return [];
  const header = rows[0];
  const idx = nombre => header.indexOf(nombre);
  const iFecha = idx('Fecha'), iHora = idx('Hora'), iNombre = idx('Nombre'),
        iPersonas = idx('Personas'), iUbic = idx('Ubicación'), iEstado = idx('Estado'), iObs = idx('Observación');
  const out = [];
  for(let i=1;i<rows.length;i++){
    const r = rows[i];
    const personasRaw = (r[iPersonas]||'').trim();
    out.push({
      fecha: normFecha(r[iFecha]),
      hora: (r[iHora]||'').trim(),
      nombre: (r[iNombre]||'').trim(),
      personas: personasRaw ? (parseInt(personasRaw,10)||0) : 0,
      ubicacion: (r[iUbic]||'').trim(),
      estado: (r[iEstado]||'').trim(),
      obs: (r[iObs]||'').trim(),
    });
  }
  return out;
}

function aplicarDatos(nuevaLista){
  RESERVAS = nuevaLista;
  activas = RESERVAS.filter(r => r.fecha && !esCancelada(r.estado));
  actualizarKpis();
  render();
}

async function actualizarDatos(){
  btnActualizar.disabled = true;
  const textoOriginal = btnActualizar.textContent;
  btnActualizar.textContent = 'Actualizando…';
  estadoActualizacion.className = 'estado-linea';
  estadoActualizacion.textContent = 'Buscando datos actuales…';
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}&_=${Date.now()}`;
    const res = await fetch(url, { cache: 'no-store' });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const csv = await res.text();
    if(/^<!DOCTYPE html/i.test(csv.trim())){
      throw new Error('la pestaña "Reservas" no está publicada a la web');
    }
    const nuevaLista = csvARenglones(csv);
    if(nuevaLista.length === 0) throw new Error('no llegaron filas');
    aplicarDatos(nuevaLista);
    const ahora = new Date().toLocaleString('es-AR');
    document.getElementById('subtitulo').textContent = `Datos actualizados en vivo: ${ahora}`;
    estadoActualizacion.className = 'estado-linea ok';
    estadoActualizacion.textContent = `Actualizado: ${ahora}`;
  } catch(err){
    estadoActualizacion.className = 'estado-linea error';
    estadoActualizacion.textContent = 'No se pudo actualizar (' + err.message + '). Verificá que la pestaña "Reservas" esté publicada a la web en Google Sheets.';
  } finally {
    btnActualizar.disabled = false;
    btnActualizar.textContent = textoOriginal;
  }
}
