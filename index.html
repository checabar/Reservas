.bg-ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,10,0.45) 0%,rgba(10,10,10,0.25) 20%,rgba(10,10,10,0.55) 55%,rgba(10,10,10,0.95) 100%)}
.bg-vig{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 35%,rgba(10,10,10,0.65) 100%)}
.bg-glow{position:absolute;top:5%;left:50%;transform:translateX(-50%);width:500px;height:350px;border-radius:50%;background:radial-gradient(ellipse,rgba(40,200,80,0.04) 0%,transparent 70%);animation:gp 7s ease-in-out infinite}
@keyframes gp{0%,100%{opacity:.4}50%{opacity:.8}}

.grain{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")}
.content{position:relative;z-index:2}

.header{text-align:center;padding:3rem 1.5rem 1rem}
.header-logo{font-family:'bernier',sans-serif;font-size:clamp(2.8rem,9vw,4.5rem);font-weight:700;letter-spacing:.2em;color:var(--gold);text-shadow:0 0 80px rgba(200,164,90,.35),0 0 30px rgba(200,164,90,.2),0 2px 4px rgba(0,0,0,.6);animation:fd .9s ease-out}
.header-tag{font-size:.75rem;color:rgba(200,164,90,.4);letter-spacing:.4em;text-transform:uppercase;margin-top:.15rem;animation:fd .9s ease-out .15s both}
.header-addr{font-size:.65rem;color:var(--t3);letter-spacing:.15em;margin-top:.6rem;animation:fi 1s ease-out .5s both}
.header-div{width:70px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:1.2rem auto;animation:fi 1s ease-out .3s both}

@keyframes fd{from{opacity:0;transform:translateY(-25px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes fu{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}
@keyframes sl{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes si{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes bi{0%{transform:scale(0)}60%{transform:scale(1.12)}100%{transform:scale(1)}}

.mode-sel{display:flex;gap:.85rem;max-width:440px;margin:.5rem auto 1.5rem;padding:0 1.5rem;animation:fu .6s ease-out .4s both}
.mode-btn{flex:1;padding:1.2rem .8rem;border:1px solid var(--brd);border-radius:14px;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);text-align:center;position:relative;overflow:hidden;color:var(--t1)}
.mode-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--gglow) 0%,transparent 60%);opacity:0;transition:opacity .35s}
.mode-btn:hover::before,.mode-btn.active::before{opacity:1}
.mode-btn:hover,.mode-btn.active{border-color:var(--gold);box-shadow:0 0 30px rgba(200,164,90,.12),inset 0 0 20px rgba(200,164,90,.06);transform:translateY(-3px)}
.mode-btn .icon{font-size:1.8rem;display:block;margin-bottom:.4rem;position:relative;z-index:1}
.mode-btn .label{font-size:.7rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--t2);position:relative;z-index:1;transition:color .3s}
.mode-btn:hover .label,.mode-btn.active .label{color:var(--gold)}

.main{max-width:500px;margin:0 auto;padding:0 1.5rem 3rem}

.form-card{background:var(--card);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--brd);border-radius:18px;padding:2rem;animation:si .5s ease-out;box-shadow:0 25px 70px rgba(0,0,0,.5)}
.form-title{font-family:'bernier',sans-serif;font-size:1.4rem;color:var(--gold);margin-bottom:.2rem}
.form-sub{font-size:.78rem;color:var(--t3);margin-bottom:1.8rem}

.hold-notice{display:flex;align-items:center;gap:.6rem;background:rgba(200,164,90,.06);border:1px solid rgba(200,164,90,.15);border-radius:10px;padding:.75rem 1rem;margin-bottom:1.5rem;font-size:.75rem;color:var(--gold);line-height:1.4}
.hold-notice .ni{font-size:1.2rem;flex-shrink:0}

.ig{margin-bottom:1.15rem;animation:sl .4s ease-out both}
.ig:nth-child(2){animation-delay:.03s}.ig:nth-child(3){animation-delay:.06s}.ig:nth-child(4){animation-delay:.09s}.ig:nth-child(5){animation-delay:.12s}.ig:nth-child(6){animation-delay:.15s}.ig:nth-child(7){animation-delay:.18s}.ig:nth-child(8){animation-delay:.21s}.ig:nth-child(9){animation-delay:.24s}
.il{display:block;font-size:.65rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--t2);margin-bottom:.45rem}
.if{width:100%;padding:.8rem 1rem;background:var(--input);border:1px solid var(--brd);border-radius:10px;color:var(--t1);font-family:'Bebas Neue',sans-serif;font-size:.92rem;transition:all .3s;outline:none;-webkit-appearance:none}
.if:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gglow)}
.if::placeholder{color:var(--t3)}
select.if{cursor:pointer}
select.if option{background:#111;color:var(--t1)}

.phone-row{display:flex;gap:.5rem}
.phone-pre{width:70px;padding:.8rem .5rem;background:var(--input);border:1px solid var(--brd);border-radius:10px;color:var(--t3);font-family:'Bebas Neue',sans-serif;font-size:.85rem;text-align:center}
.phone-row .if{flex:1}

.zone-sel{display:flex;gap:.65rem}
.zone-btn{flex:1;padding:.9rem .5rem;border:1px solid var(--brd);border-radius:10px;background:var(--input);cursor:pointer;text-align:center;transition:all .3s;color:var(--t2)}
.zone-btn:hover{border-color:var(--brd2)}
.zone-btn.sel{border-color:var(--gold);background:var(--gglow);color:var(--gold)}
.zone-btn .zi{font-size:1.3rem;display:block;margin-bottom:.25rem}
.zone-btn .zl{font-size:.68rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase}

.sub-btn{width:100%;padding:.95rem;margin-top:1.2rem;border:none;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gdim));color:var(--bg);font-family:'Bebas Neue',sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .35s}
.sub-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px var(--gglows)}
.sub-btn:active{transform:translateY(0)}
.sub-btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;box-shadow:none!important}

.sc{text-align:center;padding:2.5rem 1.5rem}
.sc-icon{font-size:3rem;margin-bottom:.8rem;animation:bi .6s ease-out .2s both}
.sc-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--gold);margin-bottom:.4rem}
.sc-text{color:var(--t2);font-size:.85rem;line-height:1.5;margin-bottom:1.5rem}
.sc-detail{background:var(--input);border:1px solid var(--brd);border-radius:10px;padding:1.1rem;margin-bottom:1rem;text-align:left}
.sc-row{display:flex;justify-content:space-between;padding:.35rem 0;font-size:.82rem}
.sc-row .dl{color:var(--t3)}.sc-row .dv{color:var(--t1);font-weight:500}
.sc-id{font-size:.65rem;color:var(--t3);letter-spacing:.1em;margin-top:.4rem}
.sc-hold{font-size:.72rem;color:var(--gold);background:rgba(200,164,90,.06);border:1px solid rgba(200,164,90,.12);border-radius:8px;padding:.6rem .8rem;margin:1rem 0;display:flex;align-items:center;gap:.4rem}

.abg{display:flex;flex-direction:column;gap:.6rem;margin-top:1rem}
.ab{padding:.8rem;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:.75rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .3s;border:none}
.ab.p{background:linear-gradient(135deg,var(--gold),var(--gdim));color:var(--bg)}
.ab.o{background:transparent;border:1px solid var(--brd);color:var(--t2)}
.ab.d{background:var(--errbg);border:1px solid var(--err);color:var(--err)}

.rs{margin-top:2rem;animation:fu .5s ease-out}
.rs-t{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:var(--t2);margin-bottom:.8rem}
.rc{background:var(--card);backdrop-filter:blur(12px);border:1px solid var(--brd);border-radius:12px;padding:1.1rem;margin-bottom:.6rem;transition:all .3s}
.rc.can{opacity:.45;border-color:var(--err)}
.rc-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem}
.rc-n{font-weight:600;font-size:.9rem}
.rc-s{font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:.15rem .5rem;border-radius:20px}
.rc-s.confirmed{background:rgba(74,158,109,.12);color:var(--ok)}
.rc-s.cancelled{background:var(--errbg);color:var(--err)}
.rc-m{display:flex;gap:.8rem;font-size:.75rem;color:var(--t3);flex-wrap:wrap}
.rc-cb{margin-top:.6rem;padding:.35rem .7rem;border:1px solid var(--err);border-radius:6px;background:transparent;color:var(--err);font-size:.65rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;font-family:inherit}

.mo{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.mc{background:var(--card);backdrop-filter:blur(24px);border:1px solid var(--brd);border-radius:16px;padding:1.8rem;max-width:380px;width:100%;animation:si .3s ease-out}
.mc-t{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;color:var(--err);margin-bottom:.6rem}
.mc-tx{font-size:.85rem;color:var(--t2);line-height:1.5;margin-bottom:1.2rem}
.mc-a{display:flex;gap:.6rem}
.mc-a .ab{flex:1}

.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--card);backdrop-filter:blur(16px);border:1px solid var(--brd);border-radius:10px;padding:.75rem 1.2rem;font-size:.82rem;box-shadow:0 10px 30px rgba(0,0,0,.6);z-index:999;transition:transform .4s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:.4rem}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--ok)}
.toast.error{border-color:var(--err)}

.es{text-align:center;padding:2.5rem 1rem;animation:fi .6s ease-out .5s both}


@media(max-width:480px){.header{padding:2.5rem 1rem .8rem}.form-card{padding:1.5rem}.main{padding:0 1rem 3rem}}
.cap-warn{margin-top:.5rem;padding:.65rem .85rem;background:rgba(196,92,92,.1);border:1px solid var(--err);border-radius:8px;font-size:.78rem;color:var(--err);line-height:1.5}
.wa-cap-btn{display:block;margin-top:.5rem;padding:.5rem .9rem;background:linear-gradient(135deg,#25D366,#128C7E);border:none;border-radius:8px;color:#fff;font-family:'Bebas Neue',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;letter-spacing:.05em}
.wa-cap-btn:hover{opacity:.9}
.zcap{display:block;font-size:.6rem;letter-spacing:.05em;margin-top:.2rem;color:var(--t3);transition:color .3s}
.zone-btn.sel .zcap{color:var(--gold)}
.zone-full{opacity:.45;cursor:not-allowed!important;pointer-events:none}
.zone-full .zcap{color:var(--err)!important}
.cap-err-block{padding:1rem!important}
.cap-err-msg{font-size:.82rem;font-weight:600;margin:0 0 .3rem;color:var(--err)}
.cap-err-sub{font-size:.75rem;color:var(--t2);margin:0 0 .7rem}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect}=React;

const CONFIG={
  barName:"CHECA",
  barTag:"Cerveceria & Bar",
  barAddr:"Av. Hipolito Yrigoyen 520, Nueva Cordoba",
  waNum:"5493514084999",
  apiURL:"https://script.google.com/macros/s/AKfycbxHWm35qrjYeBEqdEyO2liSfoZ2x2rVgwWbj7Ou-z6rVlAIvuZknmmIvdeUulyiWnjt/exec",
  holdMin:15,maxIn:70,maxOut:70,maxDays:15
};




const SK="checa_res";
const ldR=()=>{try{return JSON.parse(localStorage.getItem(SK)||"[]")}catch{return[]}};
const svR=d=>localStorage.setItem(SK,JSON.stringify(d));

const postAPI=async(data,action)=>{
  try{
    await fetch(CONFIG.apiURL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({...data,action,timestamp:new Date().toISOString()})});
    return true;
  }catch(e){return false;}
};

const td=()=>new Date().toISOString().split("T")[0];
const fD=s=>{if(!s)return'';const[y,m,d]=s.split("-");return d+"/"+m+"/"+y};
// ================================================================
// HORARIOS POR DIA -- edita aca para cambiar horarios o dias
// 0=Dom  1=Lun  2=Mar  3=Mie  4=Jue  5=Vie  6=Sab
// null = CERRADO
// {open:"HH:MM",close:"HH:MM"} = horario del dia
// ================================================================
const SCHEDULE={
  0:null,
  1:null,
  2:{open:"18:00",close:"23:30"},
  3:{open:"18:00",close:"23:30"},
  4:{open:"18:00",close:"23:30"},
  5:{open:"18:00",close:"23:30"},
  6:{open:"18:00",close:"23:30"},
};


// ================================================================
// EXCEPCIONES POR FECHA ESPECIFICA
// Para cambiar el horario (o cerrar) en una fecha puntual,
// agregala aca con el formato "YYYY-MM-DD"
// null = CERRADO ese dia | {open:"HH:MM",close:"HH:MM"} = horario especial
//
// Ejemplos:
//   "2025-04-12":null                         -> cerrado ese dia
//   "2025-04-19":{open:"18:00",close:"21:00"} -> cierra antes
// ================================================================
const DATE_OVERRIDES={
  // "2025-04-12":null,
  // "2025-04-19":{open:"18:00",close:"21:00"},
};


const getSchedule=s=>{if(!s)return null;if(DATE_OVERRIDES.hasOwnProperty(s))return DATE_OVERRIDES[s];const d=new Date(s+"T12:00:00").getDay();return SCHEDULE[d]??null};
const isClosed=s=>getSchedule(s)===null;

const getSlotsForDate=s=>{if(!s)return[];const sch=getSchedule(s);if(!sch)return[];const[oh,om]=sch.open.split(":").map(Number);const[ch,cm]=sch.close.split(":").map(Number);const slots=[];for(let h=oh;h<=ch;h++){const t0=h*60,t1=h*60+30,tOpen=oh*60+om,tClose=ch*60+cm;if(t0>=tOpen&&t0<=tClose)slots.push(String(h).padStart(2,"0")+":00");if(t1>=tOpen&&t1<=tClose)slots.push(String(h).padStart(2,"0")+":30")}return slots};
const maxDate=()=>{const d=new Date();d.setDate(d.getDate()+CONFIG.maxDays);return d.toISOString().split("T")[0]};

function App(){
  const[mode,setMode]=useState(null);
  const[view,setView]=useState("form");
  const[toast,setToast]=useState({show:false,msg:"",type:"success"});
  const[res,setRes]=useState(ldR());
  const[canT,setCanT]=useState(null);
  const[last,setLast]=useState(null);
  const[busy,setBusy]=useState(false);
  const[cap,setCap]=useState(null);
  const[capLoad,setCapLoad]=useState(false);
  const[capErr,setCapErr]=useState(null);

  const fetchCap=async date=>{
    if(!date||isClosed(date)){setCap(null);return;}
    setCapLoad(true);
    try{
      const r=await fetch(CONFIG.apiURL+"?action=capacity&date="+date);
      const d=await r.json();
      if(d.date)setCap(d);
    }catch(e){setCap(null);}
    setCapLoad(false);
  };
  

  const[rf,setRf]=useState({name:"",email:"",phone:"",date:td(),time:"",guests:"2",zone:"inside"});
  const[ef,setEf]=useState({name:"",phone:"",email:"",eventType:"",guests:"",date:td()});

  useEffect(()=>{svR(res)},[res]);
  useEffect(()=>{fetchCap(rf.date)},[]);

  const showT=(msg,type="success")=>{setToast({show:true,msg,type});setTimeout(()=>setToast(t=>({...t,show:false})),3500)};

  const handleRes=async()=>{
    if(!rf.name||!rf.email||!rf.phone||!rf.date){showT("Completa nombre, email, telefono y fecha","error");return}if(isClosed(rf.date)){showT("Ese dia estamos cerrados. Elegi otro dia.","error");return}const _lu=res.filter(r=>r.date===rf.date&&r.zone===rf.zone&&r.status==="confirmed").reduce((s,r)=>s+(parseInt(r.guests)||0),0);const _mz=rf.zone==="inside"?CONFIG.maxIn:CONFIG.maxOut;const _av=(cap&&cap.date===rf.date)?(rf.zone==="inside"?cap.insideAvailable:cap.outsideAvailable):Math.max(0,_mz-_lu);if(parseInt(rf.guests)>_av){setCapErr({show:true,avail:_av,zone:rf.zone,guests:rf.guests,date:rf.date,time:rf.time});return;}setCapErr(null);if(!rf.time){showT("Por favor selecciona un horario","error");return}
    setBusy(true);const id="RES-"+Date.now().toString(36).toUpperCase();
    const nr={id,...rf,guests:parseInt(rf.guests),status:"confirmed",createdAt:new Date().toISOString()};
    setRes(p=>[nr,...p]);setLast(nr);
    await postAPI(nr,"create");
    setBusy(false);setView("success");showT("Reserva confirmada!","success");
  };

  const handleEvt=()=>{
    if(!ef.name||!ef.phone||!ef.email||!ef.eventType||!ef.date){showT("Completa todos los campos obligatorios","error");return}
    const msg="Hola! Mi nombre es "+ef.name+".\nTelefono: "+ef.phone+"\nEmail: "+ef.email+"\n\nMe gustaria consultar por un *"+ef.eventType+"*."+(ef.guests?"\nPersonas aproximadas: "+ef.guests:"")+"\nFecha tentativa: *"+fD(ef.date)+"*\n\nPodrian darme mas informacion?";
    postAPI({...ef,type:"event"},"event");
    window.open("https://wa.me/"+CONFIG.waNum+"?text="+encodeURIComponent(msg),"_blank");
    showT("Redirigiendo a WhatsApp...","success");
  };

  const handleCan=async id=>{
    const r=res.find(x=>x.id===id);if(!r)return;
    setRes(p=>p.map(x=>x.id===id?{...x,status:"cancelled"}:x));
    await postAPI({...r,status:"cancelled"},"cancel");
    setCanT(null);showT("Reserva cancelada","error");
  };

  const reset=()=>{setView("form");setRf({name:"",email:"",phone:"",date:td(),time:"",guests:"2",zone:"inside"});setEf({name:"",phone:"",email:"",eventType:"",guests:"",date:td()});setLast(null);setCapErr(null)};

  return(
    <div className="app-container">
      <div className="bg-layer"><div className="bg-img"/><div className="bg-ov"/><div className="bg-vig"/><div className="bg-glow"/></div>
      <div className="grain"/>
      <div className="content">

        <header className="header">
          <div className="header-logo">{CONFIG.barName}</div>
          <div className="header-tag">{CONFIG.barTag}</div>
          <div className="header-div"/>
          <div className="header-addr">{CONFIG.barAddr}</div>
        </header>

        <div className="mode-sel">
          <button className={"mode-btn "+(mode==="reservation"?"active":"")} onClick={()=>{setMode("reservation");reset()}}>
            <span className="icon">🍻</span><span className="label">Reserva</span>
          </button>
          <button className={"mode-btn "+(mode==="event"?"active":"")} onClick={()=>{setMode("event");reset()}}>
            <span className="icon">🎉</span><span className="label">Evento</span>
          </button>
        </div>

        <div className="main">

          {mode==="reservation"&&view==="form"&&(
            <div className="form-card">
              <div className="form-title">Reservar Mesa</div>
              <div className="form-sub">Completa los datos y asegura tu lugar</div>
              <div className="hold-notice"><span className="ni">⏱</span><span>Las reservas se mantienen por <strong>{CONFIG.holdMin} minutos</strong> desde la hora solicitada. Pasado ese tiempo, la mesa queda disponible.</span></div>

              <div className="ig"><label className="il">Nombre y Apellido *</label><input className="if" placeholder="Ej: Juan Perez" value={rf.name} onChange={e=>setRf({...rf,name:e.target.value})}/></div>
              <div className="ig"><label className="il">Email *</label><input className="if" type="email" placeholder="juan@email.com" value={rf.email} onChange={e=>setRf({...rf,email:e.target.value})}/></div>
              <div className="ig"><label className="il">Telefono *</label><div className="phone-row"><div className="phone-pre">+54</div><input className="if" type="tel" placeholder="351 4084999" value={rf.phone} onChange={e=>setRf({...rf,phone:e.target.value})}/></div></div>
              <div className="ig"><label className="il">Fecha *</label><input className="if" type="date" min={td()} max={maxDate()} value={rf.date} onChange={e=>{const newDate=e.target.value;const slots=getSlotsForDate(newDate);setRf({...rf,date:newDate,time:slots.includes(rf.time)?rf.time:""});fetchCap(newDate);setCapErr(null);}}/>{isClosed(rf.date)&&<div className="cap-warn">⚠️ Ese dia estamos cerrados. Por favor elegi otro dia.</div>}</div>
              <div className="ig"><label className="il">Hora *</label><select className="if" value={rf.time} onChange={e=>setRf({...rf,time:e.target.value})}><option value="">Selecciona un horario</option>{getSlotsForDate(rf.date).map(t=><option key={t} value={t}>{t} hs</option>)}</select></div>
              <div className="ig"><label className="il">Personas *</label><input className="if" type="number" min="1" max="200" placeholder="Ej: 4" value={rf.guests} onChange={e=>{setRf({...rf,guests:e.target.value});setCapErr(null);}}/>{capErr&&capErr.show&&<div className="cap-warn cap-err-block"><p className="cap-err-msg">{capErr.avail===0?"No hay lugares disponibles en "+(capErr.zone==="inside"?"adentro":"afuera")+" para ese dia.":"Solo quedan "+capErr.avail+" lugar"+(capErr.avail!==1?"es":"")+" en "+(capErr.zone==="inside"?"adentro":"afuera")+" ese dia."}</p><p className="cap-err-sub">Para grupos mas grandes, contactanos por WhatsApp.</p><button className="wa-cap-btn" onClick={()=>window.open("https://wa.me/"+CONFIG.waNum+"?text="+encodeURIComponent("Hola! Quiero consultar una reserva para "+capErr.guests+" personas para el "+fD(capErr.date)+(capErr.time?" a las "+capErr.time+" hs.":".")), "_blank")}>Contactar por WhatsApp →</button></div>}</div>
              <div className="ig"><label className="il">Ubicacion *</label>{(()=>{const _li=res.filter(r=>r.date===rf.date&&r.zone==="inside"&&r.status==="confirmed").reduce((s,r)=>s+(parseInt(r.guests)||0),0);const _lo=res.filter(r=>r.date===rf.date&&r.zone==="outside"&&r.status==="confirmed").reduce((s,r)=>s+(parseInt(r.guests)||0),0);const aIn=cap&&cap.date===rf.date?cap.insideAvailable:Math.max(0,CONFIG.maxIn-_li);const aOut=cap&&cap.date===rf.date?cap.outsideAvailable:Math.max(0,CONFIG.maxOut-_lo);return(<div className="zone-sel"><button className={"zone-btn "+(rf.zone==="inside"?"sel":"")+(aIn===0?" zone-full":"")} disabled={aIn===0} onClick={()=>setRf({...rf,zone:"inside"})}><span className="zi">🏠</span><span className="zl">Adentro</span><span className="zcap">{capLoad?"...":aIn===0?"LLENO":aIn+" disp."}</span></button><button className={"zone-btn "+(rf.zone==="outside"?"sel":"")+(aOut===0?" zone-full":"")} disabled={aOut===0} onClick={()=>setRf({...rf,zone:"outside"})}><span className="zi">🌳</span><span className="zl">Afuera</span><span className="zcap">{capLoad?"...":aOut===0?"LLENO":aOut+" disp."}</span></button></div>);})()}</div>

              <button className="sub-btn" onClick={handleRes} disabled={busy}>{busy?"Procesando...":"Confirmar Reserva"}</button>
            </div>
          )}

          {mode==="reservation"&&view==="success"&&last&&(
            <div className="form-card sc">
              <div className="sc-icon">✓</div>
              <div className="sc-title">Reserva Confirmada!</div>
              <div className="sc-text">Te esperamos en {CONFIG.barName}. Enviamos confirmacion a {last.email}.</div>
              <div className="sc-detail">
                <div className="sc-row"><span className="dl">Nombre</span><span className="dv">{last.name}</span></div>
                <div className="sc-row"><span className="dl">Email</span><span className="dv">{last.email}</span></div>
                <div className="sc-row"><span className="dl">Telefono</span><span className="dv">+54 {last.phone}</span></div>
                <div className="sc-row"><span className="dl">Fecha</span><span className="dv">{fD(last.date)}</span></div>
                <div className="sc-row"><span className="dl">Hora</span><span className="dv">{last.time} hs</span></div>
                <div className="sc-row"><span className="dl">Personas</span><span className="dv">{last.guests}</span></div>
                <div className="sc-row"><span className="dl">Ubicacion</span><span className="dv">{last.zone==="inside"?"Adentro":"Afuera"}</span></div>
                <div className="sc-id">ID: {last.id}</div>
              </div>
              <div className="sc-hold"><span>⏱</span> Tu mesa se reserva por {CONFIG.holdMin} minutos desde las {last.time} hs.</div>
              <div className="abg">
                <button className="ab p" onClick={reset}>Nueva Reserva</button>
                <button className="ab o" onClick={()=>setCanT(last)}>Cancelar esta reserva</button>
              </div>
            </div>
          )}

          {mode==="event"&&(
            <div className="form-card">
              <div className="form-title">Consultar por Evento</div>
              <div className="form-sub">Completa tus datos y te contactamos por WhatsApp</div>
              <div className="ig"><label className="il">Nombre y Apellido *</label><input className="if" placeholder="Ej: Maria Garcia" value={ef.name} onChange={e=>setEf({...ef,name:e.target.value})}/></div>
              <div className="ig"><label className="il">Telefono *</label><div className="phone-row"><div className="phone-pre">+54</div><input className="if" type="tel" placeholder="351 4084999" value={ef.phone} onChange={e=>setEf({...ef,phone:e.target.value})}/></div></div><div className="ig"><label className="il">Email *</label><input className="if" type="email" placeholder="juan@email.com" value={ef.email} onChange={e=>setEf({...ef,email:e.target.value})}/></div><div className="ig"><label className="il">Personas aproximadas</label><input className="if" type="number" min="1" placeholder="Ej: 30" value={ef.guests} onChange={e=>setEf({...ef,guests:e.target.value})}/></div>
              <div className="ig"><label className="il">Tipo de Evento *</label><select className="if" value={ef.eventType} onChange={e=>setEf({...ef,eventType:e.target.value})}><option value="">Selecciona un tipo</option><option value="Cumple">Cumple</option><option value="Recibida">Recibida</option><option value="After Office">After Office</option><option value="Feria">Feria</option><option value="Evento">Evento</option><option value="Cultural">Cultural</option><option value="Evento Corporativo">Evento Corporativo</option><option value="Despedida">Despedida</option><option value="Aniversario">Aniversario</option><option value="Reunion Privada">Reunion Privada</option><option value="Otro">Otro</option></select></div>
              <div className="ig"><label className="il">Fecha Tentativa *</label><input className="if" type="date" min={td()} value={ef.date} onChange={e=>setEf({...ef,date:e.target.value})}/></div>
              <button className="sub-btn" onClick={handleEvt}>Consultar por WhatsApp</button>
            </div>
          )}

          {!mode&&(<div className="es"><div style={{fontSize:"2.5rem",marginBottom:".6rem"}}>🍺</div><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.05rem",color:"var(--t2)",marginBottom:".2rem"}}>Que queres hacer?</div><div style={{fontSize:".78rem",color:"var(--t3)"}}>Elegi una opcion arriba para comenzar</div></div>)}
        </div>
      </div>

      {canT&&(<div className="mo" onClick={()=>setCanT(null)}><div className="mc" onClick={e=>e.stopPropagation()}><div className="mc-t">Cancelar Reserva</div><div className="mc-tx">Estas seguro de cancelar la reserva de <strong>{canT.name}</strong> para el {fD(canT.date)} a las {canT.time}?</div><div className="mc-a"><button className="ab o" onClick={()=>setCanT(null)}>Volver</button><button className="ab d" onClick={()=>handleCan(canT.id)}>Si, cancelar</button></div></div></div>)}

      <div className={"toast "+toast.type+" "+(toast.show?"show":"")}><span>{toast.type==="success"?"✓":"✗"}</span> {toast.msg}</div>


    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
